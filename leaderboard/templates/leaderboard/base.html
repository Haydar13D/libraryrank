{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LibraryRank — UMSLibrary Leaderboard</title>
  <link rel="icon" type="image/png" href="{% static 'img/UMS Lib Polos (1).png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}?v=17">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>

<body>

  <header class="ums-header">
    <div class="header-left">
      <a href="https://library.ums.ac.id/" target="_blank" class="logo-lockup">
        <img src="{% static 'img/UMS Lib Polos (1).png' %}" alt="UMS Library Logo" class="ums-logo-img"
          onerror="this.style.display='none';">

      </a>
    </div>

    <nav class="header-nav">
      <div class="nav-item">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">LEADERBOARD</a>
      </div>
      <div class="nav-item">
        <a href="/seminar/" class="nav-link {% if request.path == '/seminar/' %}active{% endif %}">SEMINAR</a>
      </div>
      <div class="nav-item">
        <a href="#" class="nav-link" id="btnPanduan">PANDUAN</a>
      </div>
    </nav>

    <div class="header-right">
      <button id="themeToggle" class="header-btn header-btn-icon" title="Toggle Dark Mode">
        <span class="material-icons-outlined" id="themeIcon" style="font-size:1.1rem;">dark_mode</span>
      </button>
      <a href="/admin/" class="header-btn header-btn-text">
        <span class="material-icons-outlined" style="font-size:0.9rem;">admin_panel_settings</span> Admin
      </a>
    </div>
  </header>

  {% block content %}{% endblock %}

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span id="toastIcon"><span class="material-icons-outlined" style="color:var(--green)">check_circle</span></span>
    <span id="toastMsg">Done!</span>
  </div>

  <script>
    const CSRF_TOKEN = '{{ csrf_token }}';
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="{% static 'js/main.js' %}?v=9"></script>
  <script>
    const themeBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const currentTheme = document.documentElement.getAttribute('data-theme');
    if (currentTheme === 'dark') themeIcon.textContent = 'light_mode';

    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        themeIcon.textContent = 'dark_mode';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        themeIcon.textContent = 'light_mode';
      }
      if (typeof loadTab === 'function' && typeof currentTab !== 'undefined') {
        loadTab(currentTab);
      }
    });
  </script>
</body>

</html>
